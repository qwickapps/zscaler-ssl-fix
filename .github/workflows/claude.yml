name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner to use'
        required: false
        type: choice
        options:
          - self-hosted
          - ubuntu-latest
        default: self-hosted

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ${{ inputs.runner || 'self-hosted' }}
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_instructions: |
            BRANCHING RULES (mandatory — follow every time):
            1. Never commit directly to `dev` or `main`.
            2. Create a new branch from latest dev: `git fetch origin && git checkout -b <type>/<description> origin/dev`
               Branch types: fix, bug, feature, chore, refactor, docs
            3. After committing, push the branch and open a PR targeting `dev` (NEVER `main`).
            4. Do not add AI attribution to commits (no Co-Authored-By: Claude or similar).
            5. Use conventional commit messages: `<type>(<scope>): <description>`

            WORKTREE (preferred for isolation):
              git worktree add /tmp/wt-<branch> -b <branch> origin/dev
              # do work, commit, push
              git worktree remove /tmp/wt-<branch>

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr:*)'

